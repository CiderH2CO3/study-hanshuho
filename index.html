<!DOCTYPE html>
<html>
<head>
  <title>犯罪収益移転防止法 本人確認手段 解説スライド</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style type="text/css">
      @import url(https://fonts.googleapis.com/css?family=Ubuntu+Mono:400,700,400italic);
      /* Chromeでスライドを印刷するための設定 */
      @page {
          size: 1210px 681px;
          margin: 0;
      }
      @media print {
          .remark-slide-scaler {
              width: 100% !important;
              height: 100% !important;
              transform: scale(1) !important;
              top: 0 !important;
              left: 0 !important;
          }
      }
      /* 全体のスタイル */
      body { font-family: 'arial', sans-serif; }
      h1, h2, h3 {
        color: #006cb4;
        font-weight: 700;
      }
      .remark-slide-content h1 { font-size: 2.3em; margin-bottom: 0.3em; margin-top: 0; }
      .remark-slide-content h2 { font-size: 1.6em; margin-bottom: 0.3em; }
      .remark-slide-content h3 { font-size: 1.2em; margin-bottom: 0.2em; }
      .remark-slide-content p, .remark-slide-content li { font-size: 0.95em; line-height: 1.4; }
      .footnote {
        position: absolute;
        bottom: 1em;
      }
      /* リンク */
      a, a > code {
        color: #ff1a75;
        text-decoration: none;
      }
      /* コード */
      code {
        font-family: 'Ubuntu Mono';
        border-radius: 5px;
        -web-border-radius: 5px;
      }
      .remark-code { background: #e7e8e2; font-size: 0.8em; border: 1px solid #555; display: block; }
      .remark-inline-code { background: #e7e8e2; }
      .remark-code-line-highlighted { background-color: #f5ff49; }
      .pull-left {
        float: left;
        width: 47%;
      }
      .pull-right {
        float: right;
        width: 47%;
      }
      .pull-right ~ p {
        clear: both;
      }
      /* タイトルページ */
      .inverse {
        background: #006cb4;
        color: #CCC;
      }
      .inverse h1, .inverse h2 {
        color: #f3f3f3;
        line-height: 1em;
      }
      /* 左右二段表示 */
      .left-column {
        width: 47%;
        float: left;
        margin-right: 1%;
      }
      .right-column {
        width: 47%;
        float: right;
        margin-left: 1%;
      }

      /* テーブルのスタイル */
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 15px 0;
        font-size: 1.0em; /* Increased for readability */
        box-shadow: 0 2px 3px rgba(0,0,0,0.1);
      }
      th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }
      th {
        background-color: #006cb4;
        color: white;
        font-weight: bold;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      tr:hover {
        background-color: #f1f1f1;
      }

      /* Mermaid diagrams fitting */
      .mermaid {
        width: 100%;
        overflow: hidden;
      }
      .mermaid svg {
        max-width: 100%;
        max-height: 450px; /* Limit height to prevent overflow on slides */
        display: block;
        margin: auto;
      }
    </style>
</head>
<body>
  <!-- Remarkjs -->
  <script src="https://remarkjs.com/downloads/remark-latest.min.js" type="text/javascript"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script type="text/javascript">
    var slideshow = remark.create({
      sourceUrl: "hanshuho.md",
      highlightStyle: 'monokai',
      highlightLines: true,
      ratio: '16:9',
      highlightLanguage: 'none'
    });

    function initMermaid() {
      const codeBlocks = document.querySelectorAll('code.remark-code');
      if (codeBlocks.length === 0) return;

      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        fontFamily: 'arial',
        themeVariables: {
          fontSize: '28px'
        }
      });

      codeBlocks.forEach(function(block) {
        let lines = block.querySelectorAll('.remark-code-line');
        let text;
        if (lines.length > 0) {
          text = Array.from(lines).map(line => line.textContent).join('\n');
        } else {
          text = block.textContent;
        }
        text = text.trim();

        if (text.startsWith('sequenceDiagram') ||
            text.startsWith('graph ') ||
            text.startsWith('graph TD') ||
            text.startsWith('graph LR') ||
            text.startsWith('flowchart ')) {
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = text;
          pre.parentNode.replaceChild(div, pre);
        }
      });

      renderVisibleMermaid();
    }

    async function renderVisibleMermaid() {
      var diagrams = document.querySelectorAll('.remark-visible .mermaid:not([data-processed="true"])');
      for (let diagram of diagrams) {
        try {
          await mermaid.run({ nodes: [diagram] });
          diagram.setAttribute('data-processed', 'true');
        } catch (e) {
          console.error("Mermaid error:", e);
        }
      }
    }

    slideshow.on('afterShowSlide', function (slide) {
      renderVisibleMermaid();
    });

    // Start initialization after a short delay to allow Remark to settle
    setTimeout(initMermaid, 500);
  </script>
</body>
</html>
