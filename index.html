<DOCTYPE html>
<html>
<head>
  <title>犯罪収益移転防止法 本人確認手段 解説スライド</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style type="text/css">
      @import url(https://fonts.googleapis.com/css?family=Ubuntu+Mono:400,700,400italic);
      /* Chromeでスライドを印刷するための設定 */
      @page {
          size: 1210px 681px;
          margin: 0;
      }
      @media print {
          .remark-slide-scaler {
              width: 100% !important;
              height: 100% !important;
              transform: scale(1) !important;
              top: 0 !important;
              left: 0 !important;
          }
      }
      /* 全体のスタイル */
      body { font-family: 'arial', sans-serif; }
      h1, h2, h3 {
        color: #006cb4;
        font-weight: 700;
      }
      .remark-slide-content h1 { font-size: 3em; }
      .remark-slide-content h2 { font-size: 2em; }
      .remark-slide-content h3 { font-size: 1.4em; }
      .footnote {
        position: absolute;
        bottom: 1em;
      }
      /* リンク */
      a, a > code {
        color: #ff1a75;
        text-decoration: none;
      }
      /* コード */
      code {
        font-family: 'Ubuntu Mono';
        border-radius: 5px;
        -web-border-radius: 5px;
      }
      .remark-code { background: #e7e8e2; font-size: 0.8em; border: 1px solid #555; display: block; }
      .remark-inline-code { background: #e7e8e2; }
      .remark-code-line-highlighted { background-color: #f5ff49; }
      .pull-left {
        float: left;
        width: 47%;
      }
      .pull-right {
        float: right;
        width: 47%;
      }
      .pull-right ~ p {
        clear: both;
      }
      /* タイトルページ */
      .inverse {
        background: #006cb4;
        color: #CCC;
      }
      .inverse h1, .inverse h2 {
        color: #f3f3f3;
        line-height: 1em;
      }
      /* 左右二段表示 */
      .left-column {
        width: 48%;
        float: left;
      }
      .right-column {
        width: 48%;
        float: right;
      }
    </style>
</head>
<body>
  <!-- Remarkjs -->
  <script src="https://remarkjs.com/downloads/remark-latest.min.js" type="text/javascript"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script type="text/javascript">
    // sample.md
    var slideshow = remark.create({
      sourceUrl: "hanshuho.md",
      highlightStyle: 'monokai',
      highlightLines: true,
      ratio: '16:9',
      highlightLanguage: 'remark' // Disable automatic language detection for highlighting
    }, function() {
      // Transform ```mermaid blocks into <div class="mermaid">
      // Remark.js renders all slides at once, so we can transform all of them.
      document.querySelectorAll('code.remark-code').forEach(function(block) {
        const text = block.textContent.trim();
        if (text.startsWith('sequenceDiagram') ||
            text.startsWith('graph ') ||
            text.startsWith('flowchart ')) {
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = text;
          // Ensure it's not hidden by display:none before replacement
          pre.parentNode.replaceChild(div, pre);
        }
      });

      // Mermaid configuration
      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        fontFamily: 'arial'
      });

      const renderMermaid = function() {
        var diagrams = document.querySelectorAll('.remark-visible .mermaid:not([data-processed="true"])');
        if (diagrams.length > 0) {
          mermaid.init(undefined, diagrams);
        }
      };

      // Render mermaid diagrams on each slide change
      slideshow.on('afterShowSlide', function (slide) {
        renderMermaid();
      });

      // Initial render
      renderMermaid();
    });

    // Fallback error handling for sourceUrl
    window.addEventListener('error', function(e) {
      if (e.target && e.target.src && e.target.src.indexOf('hanshuho.md') !== -1) {
        document.body.innerHTML = '<div style="padding: 20px;"><h1>Error loading hanshuho.md</h1><p>Please ensure the file exists and is accessible.</p></div>';
      }
    }, true);
  </script>
</body>
</html>
